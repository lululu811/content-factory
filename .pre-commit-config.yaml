# pre-commit hooks for content-factory
# 安装:pip install pre-commit && pre-commit install
# 跑全量:pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(packages|test_.*\.py)
      - id: ruff-format
        files: ^(packages|test_.*\.py)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: pytest-smoke
        name: pytest smoke
        entry: uv run pytest test_smoke.py -q --no-cov
        language: system
        pass_filenames: false
        files: ^packages/
