site_name: cninfo-toolkit
site_description: Free Python toolkit for cninfo.com.cn (巨潮资讯网) announcements
site_url: https://chenliitaz.github.io/cninfo-toolkit/
repo_url: https://github.com/chenliitaz/cninfo-toolkit
repo_name: chenliitaz/cninfo-toolkit
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - social

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Usage:
      - Query announcements: usage-anns.md
      - Download PDFs: usage-pdf-dl.md
      - Extract text and tables: usage-pdf-extract.md
      - End-to-end pipeline: usage-pipeline.md
  - API Reference: api.md
  - Contributing: contributing.md
  - Changelog: changelog.md
  - License: license.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chenliitaz
    - icon: fontawesome/brands/python
      link: https://pypi.org/user/chenliitaz/

  generator: false