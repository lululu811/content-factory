[project]
name = "content-factory-sdk"
version = "1.0.0"
description = "投研内容 AI 编辑部 - 平台 SDK（SPI 接口、事件总线、组件注册）"
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }
authors = [
  { name = "chenliitaz", email = "chenliitaz@gmail.com" },
]
dependencies = [
    "content-factory-core",
    "importlib-metadata>=7.0.0",
    "structlog>=24.1.0",
]

[tool.uv.sources]
content-factory-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["content_factory_sdk"]
