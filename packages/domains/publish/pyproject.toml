[project]
name = "content-factory-publish"
version = "1.0.0"
description = "发布领域组件 - 投研内容 AI 编辑部"
requires-python = ">=3.11"
dependencies = ["content-factory-sdk"]

[tool.uv.sources]
content-factory-sdk = { workspace = true }

[project.entry-points."content_factory.publishers"]
publish-stub = "content_factory_publish:PublishProvider"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["content_factory_publish"]
