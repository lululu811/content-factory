[project]
name = "content-factory-writing"
version = "0.3.0"
description = "写作领域组件 - 投研内容 AI 编辑部"
requires-python = ">=3.11"
dependencies = ["content-factory-sdk"]

[tool.uv.sources]
content-factory-sdk = { workspace = true }

[project.entry-points."content_factory.writing"]
default = "content_factory_writing:WritingProvider"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["content_factory_writing"]
