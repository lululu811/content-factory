[project]
name = "content-factory-topic"
version = "0.3.0"
description = "投研内容 AI 编辑部 - topic 领域组件"
requires-python = ">=3.11"
dependencies = ["content-factory-sdk"]

[tool.uv.sources]
content-factory-sdk = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["content_factory_topic"]
