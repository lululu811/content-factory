[project]
name = "content-factory-topic"
version = "1.0.0"
description = "选题领域组件 - 投研内容 AI 编辑部"
requires-python = ">=3.11"
dependencies = ["content-factory-sdk"]

[tool.uv.sources]
content-factory-sdk = { workspace = true }

[project.entry-points."content_factory.topic"]
default = "content_factory_topic:TopicProvider"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["content_factory_topic"]
