[project]
name = "content-factory-trendradar"
version = "1.0.0"
description = "TrendRadar RSS 热点数据源适配器 - 投研内容 AI 编辑部"
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "chenliitaz", email = "chenliitaz@gmail.com" }]
dependencies = [
    "content-factory-sdk",
]

[tool.uv.sources]
content-factory-sdk = { workspace = true }

[project.entry-points."content_factory.data_sources"]
trendradar = "content_factory_trendradar:TrendRadarDataSource"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["content_factory_trendradar"]
