[project]
name = "content-factory-datapro"
version = "0.3.0"
description = "dataPro 专业数据检索适配器 - 投研内容 AI 编辑部"
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "chenliitaz", email = "chenliitaz@gmail.com" }]
dependencies = [
    "content-factory-sdk",
    "httpx>=0.27.0",
]

[tool.uv.sources]
content-factory-sdk = { workspace = true }

[project.entry-points."content_factory.search_providers"]
datapro = "content_factory_datapro:DataProSearchProvider"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["content_factory_datapro"]
