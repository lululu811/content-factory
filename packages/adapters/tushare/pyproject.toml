[project]
name = "content-factory-tushare"
version = "1.0.0"
description = "Tushare 数据源适配器 - 投研内容 AI 编辑部"
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }
authors = [
  { name = "chenliitaz", email = "chenliitaz@gmail.com" },
]
dependencies = [
    "content-factory-sdk",
    "httpx>=0.27",
]

[tool.uv.sources]
content-factory-sdk = { workspace = true }

[project.entry-points."content_factory.data_sources"]
tushare = "content_factory_tushare:TushareDataSource"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["content_factory_tushare"]
