[project]
name = "content-factory-minimax"
version = "1.0.0"
description = "MiniMax (妙想) 多模态生成适配器 - 投研内容 AI 编辑部"
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "chenliitaz", email = "chenliitaz@gmail.com" }]
dependencies = [
    "content-factory-sdk",
    "httpx>=0.27.0",
]

[tool.uv.sources]
content-factory-sdk = { workspace = true }

[project.entry-points."content_factory.content_generators"]
minimax = "content_factory_minimax:MiniMaxGenerator"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["content_factory_minimax"]
