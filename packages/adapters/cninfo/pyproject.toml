[project]
name = "content-factory-cninfo"
version = "0.3.0"
description = "巨潮资讯数据源适配器 - 投研内容 AI 编辑部"
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }
authors = [
  { name = "chenliitaz", email = "chenliitaz@gmail.com" },
]
dependencies = [
    "content-factory-sdk",
]

[tool.uv.sources]
content-factory-sdk = { workspace = true }

[project.entry-points."content_factory.data_sources"]
cninfo = "content_factory_cninfo:CninfoDataSource"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["content_factory_cninfo"]
