[project]
name = "content-factory-cli"
version = "1.0.0"
description = "Content Factory CLI - 投研内容 AI 编辑部命令行客户端"
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }
authors = [
  { name = "chenliitaz", email = "chenliitaz@gmail.com" },
]
dependencies = [
    "content-factory-sdk",
    "typer>=0.12.0",
    "rich>=13.7.0",
    "httpx>=0.27.0",
]

[tool.uv.sources]
content-factory-sdk = { workspace = true }

[project.scripts]
cf = "content_factory_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["content_factory_cli"]
