[project]
name = "content-factory-cli"
version = "0.3.0"
description = "投研内容 AI 编辑部 - CLI 客户端"
requires-python = ">=3.11"
dependencies = ["content-factory-sdk", "typer>=0.12.0"]

[tool.uv.sources]
content-factory-sdk = { workspace = true }

[project.scripts]
cf-new = "content_factory_cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["content_factory_cli"]
