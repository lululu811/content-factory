[project]
name = "content-factory-server"
version = "0.3.0"
description = "投研内容 AI 编辑部 - HTTP API 服务"
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }
authors = [
  { name = "chenliitaz", email = "chenliitaz@gmail.com" },
]
dependencies = [
    "content-factory-sdk",
    "content-factory-topic",
    "content-factory-research",
    "content-factory-writing",
    "content-factory-compliance",
    "content-factory-image",
    "content-factory-publish",
    "content-factory-tushare",
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.30.0",
    "opentelemetry-api>=1.43.0",
    "opentelemetry-sdk>=1.43.0",
]

[tool.uv.sources]
content-factory-sdk = { workspace = true }
content-factory-topic = { workspace = true }
content-factory-research = { workspace = true }
content-factory-writing = { workspace = true }
content-factory-compliance = { workspace = true }
content-factory-image = { workspace = true }
content-factory-publish = { workspace = true }
content-factory-tushare = { workspace = true }

[project.scripts]
cf-server = "content_factory_server.app:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["content_factory_server"]
