[project]
name = "content-factory-editor-xi-li-pai"
version = "0.3.0"
description = "犀利派编辑组件 - 投研内容 AI 编辑部"
requires-python = ">=3.11"
dependencies = ["content-factory-sdk"]

[tool.uv.sources]
content-factory-sdk = { workspace = true }

[project.entry-points."content_factory.editors"]
xi-li-pai = "content_factory_editor_xi_li_pai:XiLiEditor"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["content_factory_editor_xi_li_pai"]
