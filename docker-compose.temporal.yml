version: '3.8'

# Temporal Server 部署
# 用于文章生产工作流的持久化、重试、可观测
#
# 启动: docker-compose -f docker-compose.temporal.yml up -d
# UI: http://localhost:8080

services:
  temporal:
    image: temporalio/auto-setup:1.24
    container_name: content-factory-temporal
    ports:
      - "7233:7233"   # gRPC
    environment:
      - DB=sqlite
      - DB_PATH=/data/temporal.db
    volumes:
      - temporal-data:/data
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal-web:
    image: temporalio/ui:2.27
    container_name: content-factory-temporal-web
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      temporal:
        condition: service_healthy

  temporal-worker:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: content-factory-worker
    command: ["python", "-m", "content_factory_server.temporal_worker"]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - CF_TUSHARE_TOKEN=${CF_TUSHARE_TOKEN}
    depends_on:
      temporal:
        condition: service_healthy

volumes:
  temporal-data:
